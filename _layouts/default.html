
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ site.title }} <span style="font-size: 0.5em; color: white;">v1.0</span></h1>
            <nav>
                <a href="{{ '/' | relative_url }}">Accueil</a>
                <a href="{{ '/about' | relative_url }}">À propos</a>
            </nav>
        </header>
        <main>
            {{ content }}
        </main>
        <footer style="margin-top: 4rem; font-size: 0.8rem; opacity: 0.6; text-align: center;">
            &copy; {{ "now" | date: "%Y" }} WebModerne. Built with AI & Logic.
        </footer>
    </div>
</body>
</html>
